
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modeling Cosmos</title>
<meta name="description" content="Modeling Cosmos — a glassmorphism knowledge universe for mathematical modeling, contests, data workflows, paper writing, and toolkits." />
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Serif+SC:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#fffef2;
  --bg-2:#f2fff7;
  --text:#24303a;
  --muted:#52636f;
  --line:rgba(78, 126, 112, .18);
  --glass:rgba(255,255,255,.46);
  --glass-strong:rgba(255,255,255,.64);
  --glass-soft:rgba(255,255,255,.30);
  --shadow:0 18px 60px rgba(69,105,93,.12);
  --shadow-2:0 8px 28px rgba(69,105,93,.10);
  --blur:24px;
  --radius-xl:32px;
  --radius-lg:24px;
  --radius-md:18px;
  --tone-rose:255,222,198;
  --tone-mint:198,243,212;
  --tone-sky:191,229,255;
  --tone-peach:255,241,191;
  --tone-lavender:204,241,232;
  --tone-lemon:242,246,188;
  --topbar-bg:rgba(255,255,255,.62);
  --nav-active:rgba(255,255,255,.86);
}
body.dark{
  --bg:#0f1720;
  --bg-2:#12202a;
  --text:#f5fbff;
  --muted:#c5d8de;
  --line:rgba(202,238,226,.18);
  --glass:rgba(255,255,255,.12);
  --glass-strong:rgba(255,255,255,.18);
  --glass-soft:rgba(255,255,255,.10);
  --shadow:0 18px 60px rgba(0,0,0,.28);
  --shadow-2:0 8px 28px rgba(0,0,0,.22);
  --topbar-bg:rgba(16,26,35,.72);
  --nav-active:rgba(210,245,236,.16);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;scroll-behavior:smooth}
body{
  font-family:"Cormorant Garamond","Noto Serif SC","Songti SC","STSong",serif;
  color:var(--text);
  background:
    radial-gradient(circle at 10% 14%, rgba(255,239,185,.68), transparent 28%),
    radial-gradient(circle at 90% 12%, rgba(191,229,255,.52), transparent 26%),
    radial-gradient(circle at 16% 82%, rgba(198,243,212,.52), transparent 24%),
    radial-gradient(circle at 84% 78%, rgba(204,241,232,.42), transparent 20%),
    linear-gradient(135deg, var(--bg), var(--bg-2));
  min-height:100vh;
  overflow-x:hidden;
}
body::before,
body::after{
  left:-12rem; bottom:-14rem;
  background:conic-gradient(from 20deg, rgba(191,229,255,.30), rgba(198,243,212,.32), rgba(255,241,191,.28), rgba(204,241,232,.28), rgba(191,229,255,.30));
  animation-duration:22s;
}
@keyframes drift{
  from{transform:translate3d(0,0,0) scale(1)}
  to{transform:translate3d(2rem,-1.5rem,0) scale(1.08)}
}
.app{
  position:relative;
  z-index:1;
  width:min(1420px, calc(100% - 32px));
  margin:0 auto;
  padding:20px 0 90px;
}
.topbar{
  position:sticky;
  top:14px;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:14px 16px;
  margin-bottom:20px;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--topbar-bg);
  backdrop-filter:blur(var(--blur)) saturate(180%);
  -webkit-backdrop-filter:blur(var(--blur)) saturate(180%);
  box-shadow:var(--shadow);
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}
.brand-badge{
  width:42px;height:42px;border-radius:16px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.30), rgba(255,255,255,.08)),
    linear-gradient(135deg, rgba(var(--tone-lavender),.58), rgba(var(--tone-sky),.40), rgba(var(--tone-rose),.44));
  border:1px solid rgba(255,255,255,.38);
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow-2);
}
.brand-badge::after{
  content:"";
  position:absolute; inset:-30%;
  background:linear-gradient(120deg, transparent 38%, rgba(255,255,255,.64) 50%, transparent 62%);
  animation:sheen 6s linear infinite;
}
@keyframes sheen{
  from{transform:translateX(-120%) rotate(16deg)}
  to{transform:translateX(120%) rotate(16deg)}
}
.brand-text{min-width:0}
.brand-title{
  font-size:17px;
  font-weight:700;
  letter-spacing:.02em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.brand-sub{
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.nav-wrap{
  flex:1;
  display:flex;
  justify-content:center;
}
.nav{
  display:flex;
  gap:8px;
  align-items:center;
  overflow:auto;
  padding:2px;
  scrollbar-width:none;
}
.nav::-webkit-scrollbar{display:none}
.nav-btn,.ctrl-btn,.ghost-btn,.mini-btn{
  font-family:inherit;
  border:none;
  cursor:pointer;
  transition:transform .18s ease, background .24s ease, box-shadow .24s ease, border-color .24s ease;
}
.nav-btn{
  padding:11px 14px;
  border-radius:999px;
  color:var(--muted);
  background:transparent;
  border:1px solid transparent;
  white-space:nowrap;
  font-size:14px;
}
.nav-btn.active{
  background:var(--nav-active);
  color:var(--text);
  border-color:var(--line);
  box-shadow:var(--shadow-2);
}
.controls{
  display:flex;
  gap:10px;
  align-items:center;
}
.ctrl-group{
  display:flex;
  gap:6px;
  padding:4px;
  border:1px solid var(--line);
  background:var(--glass);
  border-radius:999px;
  backdrop-filter:blur(var(--blur)) saturate(180%);
}
.ctrl-btn{
  border-radius:999px;
  padding:8px 12px;
  background:transparent;
  color:var(--muted);
  font-size:13px;
}
.ctrl-btn.active{
  background:rgba(255,255,255,.62);
  color:#2d2440;
}
body.dark .ctrl-btn.active{
  background:rgba(255,255,255,.18);
  color:#fff;
}
.page{display:none; animation:fadeUp .35s ease}
.page.active{display:block}
@keyframes fadeUp{
  from{opacity:0; transform:translateY(12px)}
  to{opacity:1; transform:translateY(0)}
}
.hero{
  min-height:calc(100vh - 110px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:18px;
  padding:32px 0 18px;
}
.eyebrow{
  width:max-content;
  padding:10px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--glass);
  backdrop-filter:blur(var(--blur)) saturate(180%);
  font-size:13px;
  color:var(--muted);
  box-shadow:var(--shadow-2);
}
.hero-title{
  margin:0;
  font-weight:700;
  line-height:1.02;
  letter-spacing:.02em;
  font-size:clamp(3rem, 7vw, 5.9rem);
}
.hero-sub{
  display:block;
  margin-top:10px;
  font-size:clamp(1.25rem, 2.8vw, 2.1rem);
  color:var(--muted);
  font-weight:500;
}
.hero-copy{
  margin:0;
  max-width:900px;
  line-height:1.9;
  color:var(--muted);
  font-size:1.02rem;
}
.grid-6{
  display:grid;
  grid-template-columns:repeat(12, 1fr);
  gap:16px;
  margin-top:12px;
}
.grid-2,.grid-3,.grid-4{
  display:grid; gap:16px;
}
.grid-2{grid-template-columns:repeat(2, minmax(0, 1fr))}
.grid-3{grid-template-columns:repeat(3, minmax(0, 1fr))}
.grid-4{grid-template-columns:repeat(4, minmax(0, 1fr))}
.glass-card{
  position:relative;
  overflow:hidden;
  border-radius:var(--radius-xl);
  border:1px solid rgba(255,255,255,.30);
  background:
    linear-gradient(135deg, rgba(255,255,255,.26), rgba(255,255,255,.08)),
    linear-gradient(135deg, rgba(var(--tone), .26), rgba(var(--tone-2), .10));
  backdrop-filter:blur(var(--blur)) saturate(185%);
  -webkit-backdrop-filter:blur(var(--blur)) saturate(185%);
  box-shadow:var(--shadow);
  isolation:isolate;
}
.glass-card::before{
  content:"";
  position:absolute; inset:-2px;
  background:
    radial-gradient(260px circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,.34), transparent 45%),
    linear-gradient(120deg, rgba(255,255,255,.08), transparent 30%, rgba(255,255,255,.12) 56%, transparent 72%);
  opacity:.88;
  pointer-events:none;
  z-index:0;
}
.glass-card::after{
  content:"";
  position:absolute;
  inset:auto -20% -35% auto;
  width:70%;
  height:70%;
  background:radial-gradient(circle, rgba(255,255,255,.22), transparent 60%);
  filter:blur(24px);
  opacity:.72;
  pointer-events:none;
}
.glass-card > *{position:relative; z-index:1}
.card-tone-rose{--tone:var(--tone-rose);--tone-2:var(--tone-lavender)}
.card-tone-mint{--tone:var(--tone-mint);--tone-2:var(--tone-sky)}
.card-tone-sky{--tone:var(--tone-sky);--tone-2:var(--tone-lavender)}
.card-tone-peach{--tone:var(--tone-peach);--tone-2:var(--tone-rose)}
.card-tone-lavender{--tone:var(--tone-lavender);--tone-2:var(--tone-sky)}
.card-tone-lemon{--tone:var(--tone-lemon);--tone-2:var(--tone-peach)}
.flow{
  transition:transform .22s ease, box-shadow .24s ease, border-color .24s ease;
}
.flow:hover{
  transform:translateY(-6px);
  box-shadow:0 22px 70px rgba(109,80,160,.16);
}
body.dark .flow:hover{box-shadow:0 22px 70px rgba(0,0,0,.34)}
.home-card{
  grid-column:span 4;
  min-height:214px;
  padding:22px 22px 20px;
  cursor:pointer;
}
.home-card .icon{
  width:50px;height:50px;border-radius:18px;
  display:grid;place-items:center;
  margin-bottom:14px;
  font-size:24px;
  background:rgba(255,255,255,.30);
  border:1px solid rgba(255,255,255,.40);
}
.home-card h3{margin:0 0 8px; font-size:1.2rem}
.home-card p{margin:0; line-height:1.78; color:var(--muted); font-size:.97rem}
.home-card .jump{margin-top:14px; display:inline-flex; gap:6px; align-items:center; color:var(--text); font-size:.92rem}
.section-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:20px;
  margin:8px 0 18px;
}
.section-title{
  margin:0;
  font-size:clamp(2rem, 4vw, 3.25rem);
  line-height:1.06;
}
.section-desc{
  margin:10px 0 0;
  color:var(--muted);
  line-height:1.85;
  max-width:920px;
  font-size:.98rem;
}
.pill-row,.chip-row,.subnav{
  display:flex; flex-wrap:wrap; gap:10px;
}
.pill,.chip,.inline-tag{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:var(--glass-soft);
  color:var(--muted);
  font-size:13px;
  backdrop-filter:blur(calc(var(--blur) - 6px)) saturate(180%);
}
.subnav{margin:18px 0 4px}
.mini-btn{
  padding:10px 14px;
  border-radius:999px;
  background:var(--glass-soft);
  color:var(--muted);
  border:1px solid var(--line);
  font-size:13px;
}
.mini-btn.active{
  color:var(--text);
  background:rgba(255,255,255,.52);
}
body.dark .mini-btn.active{background:rgba(255,255,255,.18)}
.panel{
  padding:20px 20px 18px;
}
.panel h3,.panel h4{
  margin:0 0 10px;
  font-size:1.08rem;
}
.panel p,.panel li{
  color:var(--muted);
  line-height:1.8;
  font-size:.95rem;
}
.panel ul{margin:0; padding-left:18px}
.notice{
  padding:18px 20px;
  border-radius:24px;
  border:1px solid var(--line);
  background:var(--glass);
  color:var(--muted);
  line-height:1.8;
  box-shadow:var(--shadow-2);
}
.stage-card{
  padding:22px;
  min-height:260px;
}
.stage-card h3{margin:0 0 10px; font-size:1.16rem}
.stage-card p{margin:0 0 12px; color:var(--muted); line-height:1.8}
.stage-card ul{margin:0; padding-left:18px}
.stage-card li{color:var(--muted); line-height:1.75}
.anchor-btn{
  margin-top:14px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:11px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.40);
  color:var(--text);
  text-decoration:none;
  box-shadow:var(--shadow-2);
}
body.dark .anchor-btn{background:rgba(255,255,255,.12)}
.family-layout{
  display:grid;
  grid-template-columns:320px minmax(0,1fr);
  gap:16px;
}
.sticky-col{
  position:sticky;
  top:94px;
  align-self:start;
  display:grid;
  gap:14px;
}
.family-list{
  display:grid;
  gap:12px;
}
.family-card,.cluster-card,.model-card,.glossary-card,.contest-card,.tool-card,.code-card{
  padding:18px;
}
.family-card h3,.cluster-card h3,.model-card h3,.contest-card h3,.tool-card h3,.glossary-card h3,.code-card h3{margin:0 0 10px}
.family-card p,.cluster-card p,.model-card p,.contest-card p,.tool-card p,.glossary-card p{margin:0; color:var(--muted); line-height:1.75; font-size:.94rem}
.family-card.active,.cluster-card.active{
  outline:2px solid rgba(255,255,255,.45);
  transform:translateY(-2px);
}
.search{
  width:100%;
  border:none;
  outline:none;
  color:var(--text);
  background:transparent;
  font-family:inherit;
  font-size:15px;
}
.search-wrap{
  display:flex; align-items:center; gap:10px;
  padding:14px 16px;
  border:1px solid var(--line);
  border-radius:22px;
  background:var(--glass);
  box-shadow:var(--shadow-2);
}
.stack{display:grid; gap:16px}
.cluster-grid,.model-grid{
  display:grid; gap:16px;
}
.cluster-grid{grid-template-columns:repeat(2, minmax(0, 1fr))}
.model-grid{grid-template-columns:repeat(2, minmax(0, 1fr))}
.model-card small{
  display:block;
  color:var(--muted);
  margin-bottom:8px;
  font-size:12px;
}
.modal{
  position:fixed; inset:0;
  display:none;
  align-items:center; justify-content:center;
  padding:18px;
  z-index:80;
  background:rgba(22,18,38,.38);
  backdrop-filter:blur(14px);
}
.modal.show{display:flex}
.modal-card{
  width:min(920px, 100%);
  max-height:90vh;
  overflow:auto;
  padding:24px;
}
.close{
  position:sticky; top:0; margin-left:auto;
  width:42px;height:42px;border-radius:14px;
  display:grid;place-items:center;
  border:1px solid var(--line);
  background:rgba(255,255,255,.5);
  cursor:pointer;
}
body.dark .close{background:rgba(255,255,255,.14)}
.meta-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
  margin-top:12px;
}
.copy-hint{
  color:var(--muted);
  font-size:12px;
  margin-top:8px;
}
pre{
  margin:10px 0 0;
  padding:16px;
  border-radius:20px;
  background:rgba(34,27,52,.88);
  color:#f5efff;
  overflow:auto;
  font-size:13px;
  line-height:1.75;
}
body.dark pre{background:rgba(8,10,21,.84)}
.copy-toast{
  position:fixed;
  right:18px; bottom:88px;
  z-index:90;
  padding:12px 14px;
  border-radius:16px;
  background:rgba(37,29,60,.88);
  color:#fff;
  box-shadow:var(--shadow);
  display:none;
}
.copy-toast.show{display:block; animation:fadeUp .25s ease}
.float-home,.float-top{
  position:fixed;
  z-index:30;
  width:56px;height:56px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.34);
  display:grid;place-items:center;
  background:rgba(255,255,255,.20);
  backdrop-filter:blur(var(--blur)) saturate(180%);
  box-shadow:var(--shadow);
  cursor:pointer;
  color:var(--text);
}
.float-home{right:20px; bottom:20px}
.float-top{right:20px; bottom:86px}
.footer{
  margin-top:28px;
  padding:20px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}
a.link{
  color:inherit;
  text-decoration:none;
  border-bottom:1px dashed currentColor;
}
.tools-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.tool-links{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.tool-links a{
  text-decoration:none; color:var(--text);
  padding:8px 12px; border-radius:999px;
  background:rgba(255,255,255,.42);
  border:1px solid var(--line);
  font-size:13px;
}
body.dark .tool-links a{background:rgba(255,255,255,.12)}
.contest-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.contest-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.contest-link{
  margin-top:14px;
  display:inline-flex;
  text-decoration:none;
  color:var(--text);
  padding:10px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.42);
  border:1px solid var(--line);
}
body.dark .contest-link{background:rgba(255,255,255,.12)}
.glossary-search{margin-bottom:16px}
.glossary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.micro-note{
  color:var(--muted);
  font-size:13px;
  line-height:1.8;
}
hr.sep{
  border:none;
  border-top:1px solid var(--line);
  margin:16px 0;
}

.archetype-card{cursor:pointer}
.archetype-card.active{
  outline:2px solid rgba(255,255,255,.7);
  transform:translateY(-3px);
}
.family-jump-wrap,.lab-step-links{
  display:flex; flex-wrap:wrap; gap:10px; margin-top:12px;
}
.tool-card{min-height:160px}
.tool-links a:hover,.contest-link:hover,.anchor-btn:hover,.nav-btn:hover,.mini-btn:hover,.ctrl-btn:hover{
  transform:translateY(-1px);
}
.glass-card.press{animation:pressPulse .45s ease}
@keyframes pressPulse{
  0%{transform:scale(.985)}
  45%{transform:scale(1.012)}
  100%{transform:scale(1)}
}
.float-home::after{
  content:"Home";
  position:absolute;
  bottom:-18px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.04em;
}
body.dark .float-home::after, body.dark .float-top::after{color:#d8f3ea}
#floatTop::after{
  content:"Top";
  position:absolute;
  bottom:-18px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.04em;
}
.family-overview-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
  margin-top:14px;
}
.lab-controls{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.path-jump-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:16px;
  margin-top:14px;
}
@media (max-width:900px){
  .family-overview-grid,.path-jump-grid{grid-template-columns:1fr}
}

@media (max-width: 1180px){
  .grid-6 .home-card{grid-column:span 6}
  .family-layout{grid-template-columns:1fr}
  .sticky-col{position:relative; top:auto}
  .tools-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (max-width: 900px){
  .topbar{
    border-radius:28px;
    align-items:flex-start;
    flex-direction:column;
  }
  .nav-wrap{width:100%; justify-content:flex-start}
  .controls{width:100%; justify-content:space-between}
  .grid-2,.grid-3,.grid-4,.contest-grid,.tools-grid,.glossary-grid,.cluster-grid,.model-grid,.meta-grid{
    grid-template-columns:1fr;
  }
}
@media (max-width: 680px){
  .app{width:min(100% - 18px, 1420px)}
  .grid-6 .home-card{grid-column:span 12}
  .hero{min-height:auto; padding-top:8px}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-badge"></div>
      <div class="brand-text">
        <div class="brand-title" id="brandTitle">Modeling Cosmos</div>
        <div class="brand-sub" id="brandSub">A glassy little universe for mathematical modeling</div>
      </div>
    </div>
    <div class="nav-wrap">
      <nav class="nav" id="topNav"></nav>
    </div>
    <div class="controls">
      <div class="ctrl-group">
        <button class="ctrl-btn" data-lang="zh">中</button>
        <button class="ctrl-btn" data-lang="en">EN</button>
      </div>

const DATA = {"hero": {"zhTitle": "Modeling Cosmos", "zhSubtitle": "数学建模知识宇宙", "zhTagline": "给第一次参加数学建模的人，也给想把建模方法越学越深的人。这里不是单一题型的速查表，而是一张可以反复进入、反复回看的学习星图。", "enTitle": "Modeling Cosmos", "enSubtitle": "A universe for mathematical modeling", "enTagline": "Built for first-time contest teams and for learners who want a deeper toolbox. Not a one-shot cheat sheet, but a revisit-friendly map of methods, data, writing, and competitions."}, "homeCards": [{"id": "start", "tone": "rose", "icon": "✦", "zh": "先看这个！", "en": "Start Here!", "zhDesc": "一页看懂这个网站怎么用、从哪开始、每个模块解决什么问题。", "enDesc": "A one-page map of what this site does, where to begin, and what each module solves."}, {"id": "learn", "tone": "mint", "icon": "➜", "zh": "进入学习", "en": "Learning Path", "zhDesc": "按阶段推进：会看题、会选模、会处理数据、会写论文。", "enDesc": "Progress by stages: read the problem, choose models, process data, and write clearly."}, {"id": "universe", "tone": "sky", "icon": "◎", "zh": "模型宇宙", "en": "Model Universe", "zhDesc": "题型纵览、模型大类、小类细分、算法谱系，全都在这里串起来。", "enDesc": "Problem archetypes, major families, subfamilies, and algorithm maps in one place."}, {"id": "lab", "tone": "peach", "icon": "◌", "zh": "数据与代码实验室", "en": "Data & Code Lab", "zhDesc": "从清洗到特征工程，再到可复制的 starter code，一步一步拆开。", "enDesc": "From cleaning and feature engineering to copyable starter code, step by step."}, {"id": "studio", "tone": "lavender", "icon": "▣", "zh": "论文与工具工作室", "en": "Paper & Toolkit", "zhDesc": "论文结构、创新点、伪代码、文献检索、平台工具，整合收纳。", "enDesc": "Paper structure, innovation, pseudocode, literature search, and essential tools."}, {"id": "galaxy", "tone": "lemon", "icon": "☼", "zh": "竞赛星图", "en": "Contest Galaxy", "zhDesc": "不同赛事各有脾气：节奏、题风、偏好方法，一眼比清楚。", "enDesc": "Each contest has its own style. Compare pace, question flavor, and favorite methods quickly."}], "startBlocks": [{"zhTitle": "这个站适合谁", "enTitle": "Who this is for", "zhItems": ["刚开始接触数学建模，不知道题目应该怎么拆的人。", "准备国赛 / 美赛 / 校赛 / 挑战赛，想快速建立方法地图的人。", "已经会写一点代码，但模型选择、论文表达、比赛节奏还不稳定的人。"], "enItems": ["Beginners who can read a problem but do not yet know how to break it down.", "Contest teams preparing for CUMCM, MCM/ICM, school contests, or challenge cups.", "Learners who can already code a bit but still want a steadier method map, writing style, and contest rhythm."]}, {"zhTitle": "建议你这样逛", "enTitle": "A good way to use it", "zhItems": ["第一次来：先看“进入学习”，跟着阶段走。", "拿到新题：先去“模型宇宙”，先判定题目原型，再看模型大类。", "开始动手：去“数据与代码实验室”，把清洗、变换、EDA 和 starter code 串起来。", "准备交卷：回到“论文与工具工作室”，检查摘要、图表、创新点和引用。"], "enItems": ["First visit: begin with Learning Path and follow the staged route.", "New contest problem in hand: jump to Model Universe, identify the problem archetype, then inspect model families.", "Starting implementation: use Data & Code Lab to connect cleaning, transforms, EDA, and starter code.", "Preparing the final report: return to Paper & Toolkit and review the abstract, figures, innovation, and references."]}, {"zhTitle": "这个版本做了什么升级", "enTitle": "What changed in this version", "zhItems": ["彻底移除了“判断树”式表达，改成更适合反复学习的知识宇宙入口。", "主界面压缩成 6 个模块，结构更稳，信息不散。", "模型区改成“大类 → 小类 → 单模型详情”的三层组织。", "数据处理和代码不再分家，代码卡片整张可复制。", "竞赛部分扩充到 8 个官方可查的常见赛事。"], "enItems": ["The old decision-tree framing is gone; the site now behaves like a revisit-friendly knowledge universe.", "The home screen is condensed into 6 modules so the structure feels cleaner.", "The model area now follows a three-level organization: family → subfamily → model detail.", "Data workflow and starter code now live together, with click-to-copy code cards.", "The contest section is expanded to 8 widely used competitions with official references."]}], "learningStages": [{"id": "stage1", "tone": "rose", "zh": "Stage 1 · 先会看题", "en": "Stage 1 · Read the problem", "zhDesc": "先别急着上模型。先判断题目到底在问“算一个量”“做一个方案”“预测未来”“识别类别”“解释机制”还是“混合任务”。", "enDesc": "Do not jump to a model too early. First decide whether the task asks for a value, a plan, a forecast, a classification, a mechanism, or a mixed pipeline.", "zhBullets": ["圈出输出对象：数值、排序、方案、分类标签、路径、曲线。", "圈出限制条件：预算、容量、时间窗、连续性、稳定性、可解释性。", "圈出可用资源：给定数据、可查背景参数、是否允许自采数据。"], "enBullets": ["Mark the expected output: value, ranking, plan, class label, route, or curve.", "Mark the constraints: budget, capacity, time windows, continuity, stability, interpretability.", "Mark the available resources: provided data, external parameters, and whether extra data collection is allowed."]}, {"id": "stage2", "tone": "mint", "zh": "Stage 2 · 先会选模", "en": "Stage 2 · Choose a family first", "zhDesc": "别在几十个模型里乱跳，先锁定模型大类，再看小类。比如预测类、评价类、优化类、仿真类、统计推断类。", "enDesc": "Do not bounce among dozens of methods at random. Lock a family first, then narrow into a subfamily: forecasting, evaluation, optimization, simulation, or inference.", "zhBullets": ["题目问未来走势：优先看预测与时间序列。", "题目问最优方案：优先看优化与网络。", "题目问谁更好：优先看评价与决策。", "题目问机制变化：优先看微分方程、系统动力学、仿真。"], "enBullets": ["If the task asks about future trends, inspect forecasting and time series first.", "If it asks for the best plan, inspect optimization and network methods first.", "If it asks which option is better, inspect evaluation and decision methods first.", "If it asks how a mechanism evolves, inspect differential equations, system dynamics, and simulation."]}, {"id": "stage3", "tone": "sky", "zh": "Stage 3 · 先会处理数据", "en": "Stage 3 · Tidy the data", "zhDesc": "很多题不是输在模型，而是输在脏数据、尺度不统一、图表没把问题讲清楚。", "enDesc": "Many teams do not fail because of the model itself, but because of dirty data, inconsistent scales, or unclear figures.", "zhBullets": ["先做 audit：字段、类型、缺失、异常、重复、单位。", "再做 transform：标准化、编码、对数变换、时间拆分。", "再做 EDA：分布、关系、结构、偏差。"], "enBullets": ["Start with an audit: columns, types, missing values, outliers, duplicates, and units.", "Then transform: scaling, encoding, log transforms, and time parsing.", "Then run EDA: distributions, relationships, structure, and bias."]}, {"id": "stage4", "tone": "lavender", "zh": "Stage 4 · 先会写清楚", "en": "Stage 4 · Present clearly", "zhDesc": "比赛不是只看你算没算出来，也看你有没有把思路交代得让评委愿意相信。", "enDesc": "Contests do not judge only whether you computed something; they also judge whether your reasoning is easy to trust.", "zhBullets": ["摘要只写最硬的东西：问题、方法、结果、亮点。", "图表优先于大段文字，但图名和图注要短、准、能落地。", "创新点必须有对比基准，不能空喊“改进”。"], "enBullets": ["In the abstract, keep only the hardest essentials: problem, method, result, and contribution.", "Prefer figures to long paragraphs, but keep titles and captions short, precise, and useful.", "An innovation claim needs a baseline comparison; saying 'improved' is not enough."]}], "problemArchetypes": [{"tone": "rose", "zh": "数值求解型", "en": "Numeric solving", "zhDesc": "输出是一个数或一组数，强调误差、精度和求解过程。", "enDesc": "Outputs are one or more numerical values, with emphasis on error, precision, and solving procedure."}, {"tone": "mint", "zh": "方案决策型", "en": "Policy & decision", "zhDesc": "输出是一个方案、排序或建议框架，强调逻辑自洽和可执行性。", "enDesc": "Outputs are plans, rankings, or recommendation frameworks, with emphasis on consistency and actionability."}, {"tone": "sky", "zh": "预测型", "en": "Forecasting", "zhDesc": "输出未来值、趋势或情景区间，强调时序结构和泛化能力。", "enDesc": "Outputs are future values, trends, or scenario bands, emphasizing temporal structure and generalization."}, {"tone": "peach", "zh": "分类识别型", "en": "Classification", "zhDesc": "输出类别、标签或风险分层，强调边界、特征和可解释性。", "enDesc": "Outputs are classes, labels, or risk tiers, emphasizing boundaries, features, and interpretability."}, {"tone": "lavender", "zh": "优化调度型", "en": "Optimization", "zhDesc": "输出最优分配、路径、策略或资源组合，强调约束与目标权衡。", "enDesc": "Outputs are best allocations, routes, strategies, or resource mixes, emphasizing trade-offs under constraints."}, {"tone": "lemon", "zh": "机理仿真型", "en": "Mechanism & simulation", "zhDesc": "输出动态轨迹、系统响应或演化规律，强调变量关系和机制假设。", "enDesc": "Outputs are dynamic trajectories, system responses, or evolution laws, emphasizing mechanism assumptions."}, {"tone": "mint", "zh": "网络图论型", "en": "Networks & graphs", "zhDesc": "输出路径、连通结构、流量与节点角色，强调网络结构信息。", "enDesc": "Outputs are routes, structures, flows, and node roles, emphasizing network topology."}, {"tone": "sky", "zh": "混合任务型", "en": "Mixed pipeline", "zhDesc": "题目跨多个问法，通常需要预测 + 优化、评价 + 决策或机制 + 数据。", "enDesc": "The problem mixes multiple question styles, often requiring forecast + optimization, evaluation + decision, or mechanism + data."}], "families": [{"id": "forecast", "tone": "sky", "zh": "预测与时间序列", "en": "Forecasting & Time Series", "summary_zh": "当题目在问未来会怎样、下一步会发生什么、某指标会不会继续涨跌，先来看这里。", "summary_en": "Start here when the task asks what will happen next, how a metric will evolve, or how future values may shift.", "clusters": [{"id": "forecast_classic", "zh": "经典时间序列", "en": "Classic time series", "desc_zh": "适合单变量或少量变量、有明显时间依赖、需要趋势与季节项解释的任务。", "desc_en": "Suitable for uni- or low-dimensional series with clear temporal dependence, trends, and seasonality.", "models": [{"name_zh": "ARIMA / SARIMA", "name_en": "ARIMA / SARIMA", "when_zh": "短中期时间序列预测，序列较平稳或可差分到平稳。", "when_en": "Short- to mid-range forecasting when the series is stationary or can be differenced to stationarity.", "output_zh": "未来点预测、置信区间、残差诊断。", "output_en": "Point forecasts, confidence intervals, and residual diagnostics.", "pitfall_zh": "忽略平稳性与季节结构时，结果很容易漂。", "pitfall_en": "Ignoring stationarity or seasonal structure can make forecasts drift badly.", "tags": ["trend", "seasonality", "diagnostic"]}, {"name_zh": "指数平滑 ETS", "name_en": "Exponential Smoothing / ETS", "when_zh": "需要快速、稳定的基线预测时非常好用。", "when_en": "Very useful when you need a fast and stable baseline forecaster.", "output_zh": "平滑后的趋势、季节分解与短期预测。", "output_en": "Smoothed level, trend/seasonal components, and short-horizon forecasts.", "pitfall_zh": "结构突变时，纯平滑模型会反应偏慢。", "pitfall_en": "Pure smoothing can react slowly under structural breaks.", "tags": ["baseline", "fast", "short-term"]}, {"name_zh": "VAR 向量自回归", "name_en": "VAR", "when_zh": "多个变量相互影响，且都按时间演化。", "when_en": "Several variables evolve together and influence each other over time.", "output_zh": "多变量联动预测与冲击响应分析。", "output_en": "Joint multivariate forecasts and impulse-response style analysis.", "pitfall_zh": "变量太多而样本太短时很容易过拟合。", "pitfall_en": "Too many variables with too little history easily leads to overfitting.", "tags": ["multivariate", "interaction", "lag"]}]}, {"id": "forecast_grey", "zh": "灰色与小样本预测", "en": "Grey & small-sample forecasting", "desc_zh": "当数据很少、信息不完整、但你仍想拿到一个可解释的短期预测时，灰色系统非常实用。", "desc_en": "When data are scarce and information is incomplete but you still need an interpretable short-term forecast, grey-system methods are practical.", "models": [{"name_zh": "GM(1,1)", "name_en": "GM(1,1)", "when_zh": "小样本、弱信息、单变量趋势预测。", "when_en": "Small-sample, weak-information, single-series trend forecasting.", "output_zh": "发展系数、灰作用量与未来趋势。", "output_en": "Development coefficients and future trend projections.", "pitfall_zh": "对剧烈波动或强季节序列不够稳。", "pitfall_en": "Not stable on sharply fluctuating or strongly seasonal data.", "tags": ["small sample", "weak information", "trend"]}, {"name_zh": "灰色马尔可夫", "name_en": "Grey-Markov", "when_zh": "先用灰色模型抓趋势，再用状态转移修正波动。", "when_en": "Use a grey model for trend, then a Markov layer to refine fluctuation states.", "output_zh": "更平滑的趋势与状态修正后的区间判断。", "output_en": "Trend plus state-adjusted interval judgement.", "pitfall_zh": "状态划分过粗或过细都会伤害结果。", "pitfall_en": "State partitioning that is too coarse or too fine hurts performance.", "tags": ["trend + state", "correction", "state transition"]}, {"name_zh": "Verhulst 灰色模型", "name_en": "Grey Verhulst", "when_zh": "适合饱和型增长、S 形增长或资源约束增长。", "when_en": "Useful for saturation growth, S-curves, or resource-constrained growth.", "output_zh": "饱和水平附近的演化趋势。", "output_en": "Evolution toward a saturation level.", "pitfall_zh": "如果真实过程不是饱和增长，模型假设会很勉强。", "pitfall_en": "If the real process is not saturating, the assumptions become strained.", "tags": ["saturation", "S-curve", "growth"]}]}, {"id": "forecast_ml", "zh": "机器学习预测", "en": "Machine-learning forecasting", "desc_zh": "当特征很多、非线性强、想吃到交互效应时，可以把预测任务转成监督学习。", "desc_en": "When features are rich and nonlinear interactions matter, forecasting can be reframed as supervised learning.", "models": [{"name_zh": "随机森林回归", "name_en": "Random Forest Regressor", "when_zh": "非线性明显、关系复杂、但又想保持一定稳健性。", "when_en": "When relationships are nonlinear and complex but you still want a robust model.", "output_zh": "变量重要性、点预测、袋外误差参考。", "output_en": "Feature importance, point forecasts, and out-of-bag references.", "pitfall_zh": "外推能力通常不如结构化时间序列模型。", "pitfall_en": "Extrapolation is usually weaker than structured time-series models.", "tags": ["nonlinear", "robust", "feature importance"]}, {"name_zh": "XGBoost / LightGBM", "name_en": "XGBoost / LightGBM", "when_zh": "高维特征、表格数据、想追求强预测性能。", "when_en": "For high-dimensional tabular data when strong predictive performance matters.", "output_zh": "预测值、特征贡献、分裂结构。", "output_en": "Predictions, feature contributions, and split structures.", "pitfall_zh": "如果验证设计不当，很容易把未来信息泄露进去。", "pitfall_en": "Poor validation design easily leaks future information.", "tags": ["tabular", "boosting", "performance"]}, {"name_zh": "LSTM / 时序神经网络", "name_en": "LSTM / sequence models", "when_zh": "长依赖、多变量序列、非线性时间结构明显。", "when_en": "For long dependencies, multivariate sequences, and highly nonlinear temporal structure.", "output_zh": "序列级预测、隐藏状态表示。", "output_en": "Sequence-level forecasts and latent temporal representations.", "pitfall_zh": "数据量不够时，深度模型常常赢不了强基线。", "pitfall_en": "With limited data, deep models often lose to strong baselines.", "tags": ["long memory", "deep learning", "sequence"]}]}]}, {"id": "classification", "tone": "rose", "zh": "分类与识别", "en": "Classification & Recognition", "summary_zh": "当输出是类别、标签、风险等级或“属于哪一类”的判断时，优先看这里。", "summary_en": "Look here when the output is a class, label, risk level, or a 'which category does it belong to' judgement.", "clusters": [{"id": "cls_linear", "zh": "线性与概率分类", "en": "Linear & probabilistic classification", "desc_zh": "适合基线模型、可解释需求强、变量与类别边界相对清晰的情况。", "desc_en": "Good for baselines, interpretability-heavy tasks, and relatively clean class boundaries.", "models": [{"name_zh": "逻辑回归", "name_en": "Logistic Regression", "when_zh": "二分类或多分类基线，尤其适合需要解释变量方向和显著性。", "when_en": "A strong baseline for binary or multiclass tasks, especially when coefficient interpretation matters.", "output_zh": "类别概率、系数方向、优势比。", "output_en": "Class probabilities, coefficient directions, and odds ratios.", "pitfall_zh": "强非线性边界时，线性 logit 会吃亏。", "pitfall_en": "Linear logits struggle on strongly nonlinear boundaries.", "tags": ["interpretable", "probability", "baseline"]}, {"name_zh": "朴素贝叶斯", "name_en": "Naive Bayes", "when_zh": "文本、词频、条件独立近似尚可的任务。", "when_en": "Useful for text-like features and tasks where conditional independence is a tolerable approximation.", "output_zh": "后验概率与类别决策。", "output_en": "Posterior probabilities and class decisions.", "pitfall_zh": "特征相关性强时假设会偏离现实。", "pitfall_en": "The assumptions weaken when features are strongly correlated.", "tags": ["fast", "text", "posterior"]}, {"name_zh": "判别分析 LDA/QDA", "name_en": "LDA / QDA", "when_zh": "想用分布假设建立较轻量的分类器。", "when_en": "Useful when class-conditional distribution assumptions are acceptable.", "output_zh": "判别边界与类别概率。", "output_en": "Discriminant boundaries and class probabilities.", "pitfall_zh": "对分布形状与协方差假设较敏感。", "pitfall_en": "Sensitive to distributional and covariance assumptions.", "tags": ["distributional", "lightweight", "boundary"]}]}, {"id": "cls_margin", "zh": "间隔、树与集成", "en": "Margins, trees, and ensembles", "desc_zh": "适合边界复杂、特征交互多、对预测准确率要求较高的任务。", "desc_en": "Useful when class boundaries are complex, interactions are rich, and predictive accuracy is important.", "models": [{"name_zh": "支持向量机 SVM", "name_en": "Support Vector Machine", "when_zh": "中小样本、边界清楚、维度高但样本不算太大。", "when_en": "Good for medium-sized datasets with relatively clear boundaries and possibly high-dimensional features.", "output_zh": "分类边界、支持向量、间隔最大化结果。", "output_en": "Decision boundaries, support vectors, and max-margin classification.", "pitfall_zh": "大样本时训练成本可能偏高。", "pitfall_en": "Training cost can become heavy on large datasets.", "tags": ["margin", "kernel", "small-medium"]}, {"name_zh": "决策树", "name_en": "Decision Tree", "when_zh": "你需要一条能直接写进论文的 if-then 规则链。", "when_en": "Great when you want an if-then rule chain that reads well in a report.", "output_zh": "树结构、规则路径、特征分裂。", "output_en": "Tree structure, rule paths, and feature splits.", "pitfall_zh": "单棵树很容易过拟合。", "pitfall_en": "A single tree overfits easily.", "tags": ["rules", "interpretable", "split"]}, {"name_zh": "随机森林 / XGBoost 分类", "name_en": "Random Forest / XGBoost Classifier", "when_zh": "表格数据识别的常见强力选手。", "when_en": "Common strong performers for tabular classification.", "output_zh": "类别预测、特征重要性、集成投票结果。", "output_en": "Class predictions, feature importance, and ensemble voting.", "pitfall_zh": "解释性比单棵树更弱，需要额外解释工具。", "pitfall_en": "Interpretability is weaker than a single tree and may need extra tools.", "tags": ["ensemble", "tabular", "strong baseline"]}]}]}, {"id": "evaluation", "tone": "lavender", "zh": "评价与决策", "en": "Evaluation & Decision", "summary_zh": "当问题在问“谁更好”“怎么排序”“该选什么方案”时，通常先到这里集合。", "summary_en": "When the task asks which option is better, how to rank alternatives, or which scheme to choose, start here.", "clusters": [{"id": "eva_mcdm", "zh": "多指标综合评价", "en": "Multi-criteria decision making", "desc_zh": "适合把多个维度压缩成一个总分、排序或方案推荐。", "desc_en": "Useful when multiple dimensions must be combined into a final score, ranking, or recommendation.", "models": [{"name_zh": "AHP 层次分析法", "name_en": "AHP", "when_zh": "指标结构清晰、专家判断重要、权重需要成体系地给出时。", "when_en": "Useful when indicator hierarchies are clear and expert judgement matters for weights.", "output_zh": "权重、判断矩阵、一致性检验与综合排序。", "output_en": "Weights, pairwise matrices, consistency checks, and final rankings.", "pitfall_zh": "主观性较强，必须交代权重来源。", "pitfall_en": "Subjectivity is strong, so weight sources must be explained.", "tags": ["weights", "hierarchy", "consistency"]}, {"name_zh": "TOPSIS", "name_en": "TOPSIS" tandardize or normalize when needed.", "Use log or Box-Cox to compress skewness.", "Encode categorical variables with One-Hot or Label encoding."], "related": ["scaling", "encoding"]}, {"id": "feature", "tone": "peach", "zh": "04 · Feature 工程", "en": "04 · Feature engineering", "desc_zh": "很多好结果不是靠更复杂的模型，而是靠更像问题本身的特征。", "desc_en": "Many strong results come not from a more complicated model, but from features that better reflect the problem itself.", "bullets_zh": ["时间拆分：年/月/日/小时/星期。", "交叉特征、分箱、比值、滚动统计。", "相关性筛选、PCA、降冗余。"], "bullets_en": ["Split time into year/month/day/hour/week.", "Build interaction terms, bins, ratios, and rolling features.", "Use correlation screens, PCA, or redundancy reduction."], "related": ["time_features", "pca_reduce"]}, {"id": "eda", "tone": "lavender", "zh": "05 · EDA 探索", "en": "05 · EDA explore", "desc_zh": "EDA 的目的不是“把图画满”，而是让你知道数据在讲什么故事、有哪些坑、哪些关系值得建模。", "desc_en": "EDA is not about flooding the report with plots. It is about hearing the data’s story, spotting traps, and identifying relationships worth modeling.", "bullets_zh": ["单变量：直方图、箱线图、分位数。", "双变量：散点图、分组箱线、相关热力图。", "结构层：时序趋势、空间分布、类别不平衡。"], "bullets_en": ["Univariate: histograms, boxplots, quantiles.", "Bivariate: scatterplots, grouped boxplots, correlation heatmaps.", "Structural views: temporal trends, spatial layouts, and class imbalance."], "related": ["eda_profile", "corr_heatmap"]}, {"id": "validate", "tone": "lemon", "zh": "06 · Validate 验证", "en": "06 · Validate", "desc_zh": "真正让结果站得住脚的，是验证设计，不是模型名字的高级程度。", "desc_en": "What makes results trustworthy is the validation design, not how fancy the model name sounds.", "bullets_zh": ["时序题避免未来信息泄露。", "分类题看精确率、召回率、F1、ROC-AUC。", "优化题做灵敏度分析与情景分析。"], "bullets_en": ["For time series, avoid leaking future information.", "For classification, inspect precision, recall, F1, and ROC-AUC.", "For optimization, run sensitivity and scenario analysis."], "related": ["ts_split", "classification_metrics"]}, {"id": "present", "tone": "mint", "zh": "07 · Present 表达", "en": "07 · Present clearly", "desc_zh": "图表是答案的一部分。你画图不是为了装饰，而是为了让评委三秒看懂结构。", "desc_en": "Figures are part of the answer. Plotting is not decoration; it is a way to make structure visible in seconds.", "bullets_zh": ["图题短一点，图注准一点。", "表格尽量三线表，数字保留位统一。", "把关键发现写成一句能落地的话。"], "bullets_en": ["Keep figure titles short and captions precise.", "Use clean tables and consistent rounding.", "Turn each key finding into one concrete sentence."], "related": ["plot_template", "summary_sentence"]}], "codeGroups": [{"id": "basics", "zh": "Pandas 基础体检", "en": "Pandas quick audit", "snippets": [{"id": "audit_basics", "title": "Basic audit", "code": "import pandas as pd\n\ndf = pd.read_csv('data.csv')\nprint(df.head())\nprint(df.info())\nprint(df.describe(include='all'))\nprint(df.isna().sum())\nprint(df.nunique())"}, {"id": "missing_fill", "title": "Missing value recipes", "code": "# median / forward fill / delete\nnum_cols = df.select_dtypes(include='number').columns\nfor c in num_cols:\n    df[c] = df[c].fillna(df[c].median())\n\ndf = df.sort_values('time')\ndf = df.fillna(method='ffill')\n# df = df.dropna()"}, {"id": "outlier_iqr", "title": "IQR outlier filter", "code": "Q1 = df['value'].quantile(0.25)\nQ3 = df['value'].quantile(0.75)\nIQR = Q3 - Q1\nlow = Q1 - 1.5 * IQR\nhigh = Q3 + 1.5 * IQR\nclean_df = df[(df['value'] >= low) & (df['value'] <= high)]"}]}, {"id": "transform", "zh": "变换与特征工程", "en": "Transforms & features", "snippets": [{"id": "scaling", "title": "Standardize / normalize", "code": "from sklearn.preprocessing import StandardScaler, MinMaxScaler\n\nX_std = StandardScaler().fit_transform(X)\nX_mm = MinMaxScaler().fit_transform(X)"}, {"id": "encoding", "title": "Categorical encoding", "code": "# One-Hot\ndf = pd.get_dummies(df, columns=['city'])\n\n# Label Encoding (ordered categories only)\nfrom sklearn.preprocessing import LabelEncoder\nle = LabelEncoder()\ndf['level_code'] = le.fit_transform(df['level'])"}, {"id": "time_features", "title": "Time features", "code": "df['time'] = pd.to_datetime(df['time'])\ndf['year'] = df['time'].dt.year\ndf['month'] = df['time'].dt.month\ndf['weekday'] = df['time'].dt.weekday\ndf['hour'] = df['time'].dt.hour"}, {"id": "pca_reduce", "title": "PCA reduction", "code": "from sklearn.decomposition import PCA\n\npca = PCA(n_components=0.95)\nX_pca = pca.fit_transform(X)\nprint(pca.explained_variance_ratio_.sum())"}]}, {"id": "eda", "zh": "EDA 与可视化", "en": "EDA & visualization", "snippets": [{"id": "eda_profile", "title": "Fast EDA plots", "code": "import matplotlib.pyplot as plt\n\ndf.hist(figsize=(10, 8), bins=30)\nplt.tight_layout()\nplt.show()\n\nprint(df.describe())"}, {"id": "corr_heatmap", "title": "Correlation heatmap", "code": "import seaborn as sns\nimport matplotlib.pyplot as plt\n\nplt.figure(figsize=(8, 6))\nsns.heatmap(df.corr(numeric_only=True), annot=True, cmap='coolwarm')\nplt.tight_layout()\nplt.show()"}, {"id": "plot_template", "title": "Simple plotting template", "code": "import matplotlib.pyplot as plt\n\nplt.figure(figsize=(8, 4))\nplt.plot(df['time'], df['value'])\nplt.xlabel('Time')\nplt.ylabel('Value')\nplt.title('Trend overview')\nplt.tight_layout()\nplt.show()"}]}, {"id": "models", "zh": "模型起步模板", "en": "Starter model templates", "snippets": [{"id": "ts_split", "title": "Time-series split", "code": "train = df[df['time'] < '2025-01-01']\ntest = df[df['time'] >= '2025-01-01']\n\nX_train, y_train = train[features], train[target]\nX_test, y_test = test[features], test[target]"}, {"id": "classification_metrics", "title": "Classification metrics", "code": "from sklearn.metrics import classification_report, roc_auc_score\n\nmodel.fit(X_train, y_train)\npred = model.predict(X_test)\nproba = model.predict_proba(X_test)[:, 1]\nprint(classification_report(y_test, pred))\nprint('ROC-AUC:', roc_auc_score(y_test, proba))"}, {"id": "summary_sentence", "title": "Result sentence skeleton", "code": "# Example reporting sentence\n# 'Model A reduced cost by 12.4% relative to the baseline while keeping service coverage above 95%.'"}]}], "studioTabs": [{"id": "paper", "zh": "论文结构", "en": "Paper structure", "cards": [{"tone": "rose", "zhTitle": "标准章节骨架", "enTitle": "Standard report skeleton", "zhText": "问题重述 → 问题分析 → 假设与符号 → 数据预处理 → 分问题建模与求解 → 模型检验 → 评价与推广 → 参考文献 → 附录。", "enText": "Problem restatement → analysis → assumptions & notation → data preprocessing → per-question modeling & solving → validation → evaluation & extension → references → appendix."}, {"tone": "mint", "zhTitle": "摘要只写硬内容", "enTitle": "Keep the abstract hard and tight", "zhText": "摘要里只留问题、方法、关键结果、最亮的创新点。不要把摘要写成背景介绍。", "enText": "Keep only the problem, methods, key results, and strongest contribution in the abstract. Do not turn it into background narrative."}, {"tone": "sky", "zhTitle": "图表优先于大段文字", "enTitle": "Prefer figures to long paragraphs", "zhText": "比赛论文通常更吃图表表达。标题要短，图注要准，图表数量可以多，但每张都要有作用。", "enText": "Contest reports usually benefit from clear figures. Keep titles short, captions precise, and make every figure earn its place."}, {"tone": "lavender", "zhTitle": "伪代码很重要", "enTitle": "Pseudocode matters", "zhText": "评委不一定想看你全部 Python 细节，但会看你有没有把流程说清楚。伪代码就是桥梁。", "enText": "Reviewers may not care about every Python detail, but they do care whether the pipeline is clear. Pseudocode is the bridge."}]}, {"id": "research", "zh": "文献与数据检索", "en": "Literature & data search", "cards": [{"tone": "rose", "zhTitle": "为什么要查文献", "enTitle": "Why literature matters", "zhText": "综述能帮你在比赛时间里迅速理解陌生领域；文献还能为模型选择、参数来源与创新点提供学术背书。", "enText": "Reviews compress unfamiliar fields quickly, while papers also justify model choice, parameter sources, and contribution claims."}, {"tone": "mint", "zhTitle": "优先查什么", "enTitle": "What to search first", "zhText": "先查 review / survey，再找与你题型最像的应用论文，再找能给出参数或数据来源的权威资料。", "enText": "Start with reviews or surveys, then application papers close to your task, then authoritative parameter and data sources."}, {"tone": "sky", "zhTitle": "常用入口", "enTitle": "Common entry points", "zhText": "Google Scholar、IEEE Xplore、ScienceDirect、arXiv、CNKI、万方、维普、Kaggle、UCI、World Bank、NOAA、Our World in Data。", "enText": "Google Scholar, IEEE Xplore, ScienceDirect, arXiv, CNKI, Wanfang, CQVIP, Kaggle, UCI, World Bank, NOAA, and Our World in Data."}]}, {"id": "toolkit", "zh": "工具平台", "en": "Toolkit", "cards": [{"tone": "peach", "zhTitle": "本地开发", "enTitle": "Local setup", "zhText": "Anaconda + Jupyter Notebook 适合快速实验；VS Code 适合写完整项目；GitHub 适合版本管理与协作。", "enText": "Anaconda + Jupyter Notebook are great for fast experiments; VS Code for fuller projects; GitHub for versioning and collaboration."}, {"tone": "lavender", "zhTitle": "在线训练", "enTitle": "Online compute", "zhText": "Google Colab 适合共享 Notebook、临时拿 GPU/TPU 跑深度学习或快速复现实验。", "enText": "Google Colab is great for shared notebooks, temporary GPU/TPU access, and rapid reproducible experiments."}, {"tone": "lemon", "zhTitle": "排版与协作", "enTitle": "Writing & collaboration", "zhText": "Overleaf 对团队排版、公式、图片和目录管理都很稳，尤其适合比赛论文和 group project。", "enText": "Overleaf is strong for collaborative writing, formulas, figures, and automatic structure, especially for contest papers and group projects."}]}, {"id": "ai", "zh": "AI 使用建议", "en": "How to use AI well", "cards": [{"tone": "rose", "zhTitle": "AI 可以帮你，但不能替你判断", "enTitle": "AI can help, but it cannot replace judgement", "zhText": "真正危险的不是用 AI，而是不带质疑地照搬。让 AI 帮你拆题、列方案、出代码骨架，然后用自己的知识筛一遍。", "enText": "The danger is not using AI; it is copying without doubt. Let AI decompose, propose options, or scaffold code, then filter everything with your own judgement."}, {"tone": "mint", "zhTitle": "先思考，再追问", "enTitle": "Think first, then prompt", "zhText": "最稳的流程是：先自己判断题型和约束，再让 AI 给方案，然后逐条追问假设、参数、边界条件和验证方法。", "enText": "A stronger workflow is: first judge the task and constraints yourself, then ask AI for options, and interrogate assumptions, parameters, boundaries, and validation."}, {"tone": "sky", "zhTitle": "摘要与文字必须手查", "enTitle": "Manually check the writing", "zhText": "摘要、创新点、结论这类地方，一定手动过一遍，确认和你们的真实结果完全一致。", "enText": "Abstracts, contributions, and conclusions must be checked manually so they match your real results exactly."}]}], "toolLinks": [{"group": "Compute", "items": [{"name": "Anaconda", "url": "https://www.anaconda.com/"}, {"name": "VS Code", "url": "https://code.visualstudio.com/"}, {"name": "Google Colab", "url": "https://colab.research.google.com/"}, {"name": "GitHub", "url": "https://github.com/"}, {"name": "Overleaf", "url": "https://www.overleaf.com/"}]}, {"group": "Literature", "items": [{"name": "Google Scholar", "url": "https://scholar.google.com/"}, {"name": "IEEE Xplore", "url": "https://ieeexplore.ieee.org/"}, {"name": "ScienceDirect", "url": "https://www.sciencedirect.com/"}, {"name": "arXiv", "url": "https://arxiv.org/"}, {"name": "CNKI", "url": "https://www.cnki.net/"}, {"name": "Wanfang", "url": "https://www.wanfangdata.com.cn/"}]}, {"group": "Datasets", "items": [{"name": "Kaggle Datasets", "url": "https://www.kaggle.com/datasets"}, {"name": "UCI Repository", "url": "https://archive.ics.uci.edu/"}, {"name": "Google Dataset Search", "url": "https://datasetsearch.research.google.com/"}, {"name": "Harvard Dataverse", "url": "https://dataverse.harvard.edu/"}, {"name": "World Bank Open Data", "url": "https://data.worldbank.org/"}, {"name": "DataFountain", "url": "https://www.datafountain.cn/datasets"}, {"name": "NOAA", "url": "https://www.ncei.noaa.gov/"}, {"name": "Our World in Data", "url": "https://ourworldindata.org"}]}], "competitions": [{"tone": "rose", "zh": "全国大学生数学建模竞赛（CUMCM）", "en": "CUMCM", "site": "https://www.mcm.edu.cn/", "style_zh": "最常见的本科数模主战场，覆盖国赛题风与标准论文节奏。", "style_en": "The flagship undergraduate modeling contest in China, with broad classic contest styles.", "tags": ["本科", "国赛", "综合题风"]}, {"tone": "mint", "zh": "MCM / ICM", "en": "MCM / ICM", "site": "https://www.comap.com/contests/mcm-icm", "style_zh": "国际化程度高，英文写作和开放问题表达要求更强。", "style_en": "More international, with heavier emphasis on English writing and open-ended framing.", "tags": ["国际", "英文论文", "开放问题"]}, {"tone": "sky", "zh": "华中杯大学生数学建模挑战赛", "en": "Huazhong Cup", "site": "https://www.hzbmmc.com/", "style_zh": "题目常含工程、多目标优化、数据分析与社科医疗综合任务。", "style_en": "Often mixes engineering, multi-objective optimization, data analysis, and social/medical themes.", "tags": ["挑战赛", "工程", "多目标"]}, {"tone": "peach", "zh": "MathorCup 数学应用挑战赛", "en": "MathorCup", "site": "https://www.mathorcup.org/", "style_zh": "应用场景贴近真实行业，适合练习综合建模与报告表达。", "style_en": "Application-driven problems close to industry scenarios, good for integrated modeling practice.", "tags": ["应用导向", "行业场景", "挑战赛"]}, {"tone": "lavender", "zh": "APMCM 亚太地区大学生数学建模竞赛", "en": "APMCM", "site": "https://www.apmcm.org/", "style_zh": "亚太地区赛事，强调英文表达与国际化参赛体验。", "style_en": "An Asia-Pacific contest with stronger English-expression and international participation experience.", "tags": ["亚太", "英文", "国际化"]}, {"tone": "lemon", "zh": "深圳杯数学建模挑战赛", "en": "Shenzhen Cup", "site": "https://www.m2ct.org/", "style_zh": "偏工程与产业问题，常见热、能、系统与优化类议题。", "style_en": "Often leans toward engineering and industrial themes such as heat, energy, systems, and optimization.", "tags": ["工程", "产业", "挑战赛"]}, {"tone": "mint", "zh": "中国研究生数学建模竞赛", "en": "China Graduate Modeling Contest", "site": "https://cpipc.acge.org.cn/cw/hp/4", "style_zh": "研究生层面的重要赛事，问题深度与研究味更强。", "style_en": "A major graduate-level contest with deeper and more research-oriented problems.", "tags": ["研究生", "研究味", "深度"]}, {"tone": "sky", "zh": "中青杯全国大学生数学建模竞赛", "en": "CYCMCM", "site": "https://www.cycmcm.com/", "style_zh": "常作为校内外扩展练习与赛前热身的热门选择。", "style_en": "Often used as an extra practice contest or warm-up before larger competitions.", "tags": ["热身", "扩展练习", "大学生"]}], "glossary": [["Baseline", "基线模型", "先立一个简单、稳定、能解释的参考模型，后续复杂模型都应该和它比较。"], ["Ablation", "消融实验", "把某个模块拿掉，看性能变化，从而说明这个模块值不值。"], ["Sensitivity Analysis", "灵敏度分析", "轻轻改参数，看结果抖不抖，用来判断模型稳不稳。"], ["Scenario Analysis", "情景分析", "设置多个未来情景或约束情景，比较方案在不同环境下的表现。"], ["Stationarity", "平稳性", "时间序列的统计特征不随时间明显漂移，是很多经典时序模型的前提。"], ["Overfitting", "过拟合", "模型把训练集记太牢，换新数据就发挥失常。"], ["Generalization", "泛化能力", "模型换到新数据、未来数据或新情景时还能不能稳住。"], ["Objective Function", "目标函数", "优化题里真正想最大化或最小化的那一项。"], ["Constraint", "约束", "限制你不能乱来的条件，比如预算、容量、时间窗、路径连续性。"], ["Pareto Frontier", "Pareto 前沿", "多目标问题里，谁也不能在不牺牲别的目标的前提下再变好的一组解。"], ["Feature Engineering", "特征工程", "把原始数据改造得更像问题本身，比如时间拆分、交叉、分箱和滚动统计。"], ["Normalization", "归一化", "把尺度压到统一范围，避免某一列因为数值大而“嗓门过高”。"], ["Standardization", "标准化", "减均值再除标准差，让特征均值约为 0、方差约为 1。"], ["Residual", "残差", "真实值和模型预测值之间的差，是检验拟合质量的重要对象。"], ["Consistency Ratio", "一致性比率", "AHP 里检查判断矩阵是不是自相矛盾的指标。"], ["Membership", "隶属度", "模糊评价中某对象属于某等级的程度，不是非黑即白。"], ["Shadow Price", "影子价格", "在线性规划中，约束放松一点点会给目标值带来多大变化。"], ["Cross Validation", "交叉验证", "把数据轮流切分训练和验证，减少偶然性。"], ["Confusion Matrix", "混淆矩阵", "分类问题里看各类别被分对、分错的情况。"], ["ROC-AUC", "ROC-AUC", "衡量分类器整体区分能力的常用指标。"], ["Pseudocode", "伪代码", "介于自然语言和代码之间的流程表达，适合写在论文里。"], ["Reproducibility", "可复现性", "别人按你的描述和代码能不能把结果重跑出来。"], ["Heuristic", "启发式", "不保证严格最优，但想办法更快找到够好的解。"], ["Interpretability", "可解释性", "模型能不能把“为什么得到这个结论”说得清楚。"], ["Data Leakage", "数据泄露", "不该看到的未来信息或答案信息提前混进训练过程。"], ["Robustness", "鲁棒性", "输入有扰动、参数有误差时，模型结果还能不能稳。"]]};

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];

function txt(v){
  if(v && typeof v === 'object' && ('zh' in v || 'en' in v)) return v[state.lang];
  return v;
}
function label(path){
  const parts = path.split('.');
  let cur = UI;
  for(const p of parts){ cur = cur[p]; }
  return cur[state.lang];
}
function esc(s=''){
  return String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}
function setLang(lang){
  state.lang = lang;
  localStorage.setItem('modeling-cosmos-lang', lang);
  $$('[data-lang]').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
  render();
}
function setTheme(theme){
  state.theme = theme;
  localStorage.setItem('modeling-cosmos-theme', theme);
  document.body.classList.toggle('dark', theme === 'dark');
  $$('[data-theme]').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === theme));
}
function setPage(page){
  state.page = page;
  location.hash = page;
  $$('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + page));
  $$('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.page === page));
  window.scrollTo({top:0, behavior:'smooth'});
}

}

      ${state.lang==='zh'

        : 'When writing: keep titles short, table captions usually go above tables, figure captions usually go below figures, and always manually check the abstract and conclusion.'}
    </div>
  `;
  $$('#page-studio [data-stab]').forEach(el => el.addEventListener('click', () => { state.studioTab = el.dataset.stab; renderStudio(); attachGlow(); }));
}
function renderGalaxy(){
  const q = state.glossaryQuery.trim().toLowerCase();
  const glossaryRows = DATA.glossary.filter(item => !q || item.join(' ').toLowerCase().includes(q));
  $('#page-galaxy').innerHTML = `
    ${sectionHead('竞赛星图','Contest Galaxy','不同比赛各有偏好：有的更工程，有的更开放，有的更像科研，有的更适合热身。下面这页让你快速建立赛事感。','Each contest has its own taste: some feel more engineering-heavy, some more open-ended, some more research-like, and some are good warm-ups. This page builds that contest intuition quickly.')}
    <div class="contest-grid">
      ${DATA.competitions.map(c => `
        <div class="glass-card contest-card flow ${cardTone(c.tone)}">
          <h3>${state.lang==='zh' ? c.zh : c.en}</h3>
          <p>${state.lang==='zh' ? c.style_zh : c.style_en}</p>
          <div class="contest-meta">${c.tags.map(tag => `<span class="chip">${tag}</span>`).join('')}</div>
          <a class="contest-link" href="${c.site}" target="_blank" rel="noopener noreferrer">${label('common.openSite')} ↗</a>
        </div>
      `).join('')}
    </div>

    <div class="glass-card panel card-tone-sky" style="margin-top:18px">
      <h3>${state.lang==='zh' ? '术语速查' : 'Glossary'}</h3>
      <div class="search-wrap glossary-search">
        <span>⌕</span>
        <input class="search" id="glossarySearch" placeholder="${label('common.searchGlossary')}" value="${esc(state.glossaryQuery)}" />
      </div>
      <div class="glossary-grid">
        ${glossaryRows.length ? glossaryRows.map(item => `
          <div class="glass-card glossary-card flow card-tone-peach">
            <div class="pill-row"><span class="pill">${state.lang==='zh' ? item[1] : item[0]}</span></div>
            <h3 style="margin-top:10px">${state.lang==='zh' ? item[1] : item[0]}</h3>
            <p>${item[2]}</p>
          </div>
        `).join('') : `<div class="notice">${label('common.noResult')}</div>`}
      </div>
    </div>
  `;
  const gs = $('#glossarySearch');
  if(gs){
    gs.addEventListener('input', e => { state.glossaryQuery = e.target.value; renderGalaxy(); attachGlow(); });
  }
}
function attachCopy(){
  $$('[data-copy]').forEach(card => {
    card.addEventListener('click', async () => {
      const raw = card.dataset.copy
        .replaceAll('&quot;','"')
        .replaceAll('&gt;','>')
        .replaceAll('&lt;','<')
        .replaceAll('&amp;','&');
      try{
        await navigator.clipboard.writeText(raw);
        showToast(label('common.copied'));
      }catch(err){
        showToast('Copy failed');
      }
    });
  });
}
let toastTimer = null;
function showToast(text){
  const toast = $('#copyToast');
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
}
function attachGlow(){
  $$('.glass-card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      card.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100).toFixed(2) + '%');
      card.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100).toFixed(2) + '%');
    });
    card.addEventListener('pointerdown', () => {
      card.classList.remove('press');
      void card.offsetWidth;
      card.classList.add('press');
    });
  });
}
function render(){
  $$('[data-lang]').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === state.lang));
  renderBrand();
  renderTopNav();
  renderHome();
  renderStart();
  renderLearn();
  renderUniverse();
  renderLab();
  renderStudio();
  renderGalaxy();
  setPage(state.page);
  attachGlow();
}
window.addEventListener('hashchange', () => {
  const page = (location.hash || '#home').replace('#','') || 'home';
  state.page = ['home','start','learn','universe','lab','studio','galaxy'].includes(page) ? page : 'home';
  setPage(state.page);
});
$$('[data-lang]').forEach(btn => btn.addEventListener('click', () => setLang(btn.dataset.lang)));
$$('[data-theme]').forEach(btn => btn.addEventListener('click', () => setTheme(btn.dataset.theme)));
$('#floatHome').addEventListener('click', () => setPage('home'));
$('#floatTop').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));
$('#closeModal').addEventListener('click', () => $('#modelModal').classList.remove('show'));
$('#modelModal').addEventListener('click', e => { if(e.target.id === 'modelModal') $('#modelModal').classList.remove('show'); });

if(!['home','start','learn','universe','lab','studio','galaxy'].includes(state.page)) state.page = 'home';
setTheme(state.theme);
render();
</script>
</body>
</html>
